<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hymn App Admin</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
    form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
    input, textarea, button { padding: 10px; font-size: 16px; }
    button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
    button:hover { background: #0056b3; }
    .song { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    .song-header { display: flex; justify-content: space-between; align-items: center; }
    .delete-btn { background: #dc3545; }
    .delete-btn:hover { background: #a71d2a; }
  </style>
</head>
<body>

  <h1>Hymn App Admin</h1>

  <h2>Add New Song</h2>
  <form id="addSongForm">
    <input type="text" id="title" name="title" placeholder="Song Title" required>
    <textarea id="lyrics" name="lyrics" rows="10" placeholder="Song Lyrics" required></textarea>
    <label>Audio File (.mp3, .wav): <input type="file" id="audio" name="audio" accept=".mp3,.wav"></label>
    <button type="submit">Upload Song</button>
  </form>

  <h2>Existing Songs</h2>
  <div id="songsList">Loading...</div>

  <script>
    const form = document.getElementById('addSongForm');
    const songsList = document.getElementById('songsList');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      try {
        const res = await fetch('/api/songs', {
          method: 'POST',
          body: formData
        });
        if (res.ok) {
          alert('Song added successfully!');
          form.reset();
          loadSongs();
        } else {
          const error = await res.json();
          alert('Error: ' + error.error);
        }
      } catch (err) {
        alert('Upload failed: ' + err.message);
      }
    });

    async function loadSongs() {
      try {
        const res = await fetch('/api/songs');
        const songs = await res.json();
        songsList.innerHTML = '';
        songs.forEach(song => {
          const div = document.createElement('div');
          div.className = 'song';
          div.innerHTML = `
            <div class="song-header">
              <h3>${song.title}</h3>
              <button class="delete-btn" onclick="deleteSong(${song.id})">Delete</button>
            </div>
            <p><strong>Audio:</strong> ${song.audio_url ? `<a href="${song.audio_url}" target="_blank">Listen</a>` : 'None'}</p>
            <pre>${song.lyrics}</pre>
          `;
          songsList.appendChild(div);
        });
      } catch (err) {
        songsList.innerHTML = 'Failed to load songs.';
      }
    }

    async function deleteSong(id) {
      if (!confirm('Are you sure you want to delete this song?')) return;
      try {
        const res = await fetch('/api/songs/' + id, { method: 'DELETE' });
        if (res.ok) {
          loadSongs();
        } else {
          alert('Failed to delete song.');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    loadSongs();
  </script>
</body>
</html>
